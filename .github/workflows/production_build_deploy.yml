name: Production Build and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: yogieat
  DOCKERHUB_APP_IMAGE_NAME: coupon-system-app
  DOCKERHUB_WORKER_IMAGE_NAME: coupon-system-worker
  REMOTE_APP_DIR: /home/ubuntu/coupon-system-design-kt

jobs:
  build:
    runs-on: ubuntu-latest
    environment: PROD
    outputs:
      app_image: ${{ steps.image-tags.outputs.app_image }}
      worker_image: ${{ steps.image-tags.outputs.worker_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: corretto
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Setup Gradle Build
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: image-tags
        run: |
          echo "app_image=${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_APP_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "worker_image=${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_WORKER_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          build-args: |
            APP_MODULE=:coupon:coupon-api
            APP_JAR_DIR=coupon/coupon-api
          tags: |
            ${{ steps.image-tags.outputs.app_image }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_APP_IMAGE_NAME }}:main-latest
          platforms: linux/amd64

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          build-args: |
            APP_MODULE=:coupon:coupon-worker
            APP_JAR_DIR=coupon/coupon-worker
          tags: |
            ${{ steps.image-tags.outputs.worker_image }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_WORKER_IMAGE_NAME }}:main-latest
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    environment: PROD
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ env.REMOTE_APP_DIR }}/docker"

      - name: Copy docker directory to Server
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -rlvz --delete --omit-dir-times --no-perms --no-owner --no-group
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USERNAME }}
          remote_key: ${{ secrets.SERVER_PRIVATE_KEY }}
          path: ./docker/
          remote_path: ${{ env.REMOTE_APP_DIR }}/docker/

      - name: Copy production compose file to Server
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -rlvz --omit-dir-times --no-perms --no-owner --no-group
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USERNAME }}
          remote_key: ${{ secrets.SERVER_PRIVATE_KEY }}
          path: ./docker/docker-compose.prod.yml
          remote_path: ${{ env.REMOTE_APP_DIR }}/docker/docker-compose.prod.yml

      - name: Deploy to Instance Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_IMAGE="${{ needs.build.outputs.app_image }}"
            WORKER_IMAGE="${{ needs.build.outputs.worker_image }}"

            echo "${{ secrets.DOCKERHUB_ACCESS_TOKEN }}" | docker login -u "${{ env.DOCKERHUB_USERNAME }}" --password-stdin
            echo "Deploying APP image: ${APP_IMAGE}"
            echo "Deploying WORKER image: ${WORKER_IMAGE}"

            cd "${{ env.REMOTE_APP_DIR }}"

            APP_IMAGE="${APP_IMAGE}" WORKER_IMAGE="${WORKER_IMAGE}" \
            docker compose -f docker/docker-compose.prod.yml pull coupon-app coupon-worker

            APP_IMAGE="${APP_IMAGE}" WORKER_IMAGE="${WORKER_IMAGE}" \
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans --no-build

            ACTUAL_APP_IMAGE="$(docker inspect --format '{{.Config.Image}}' coupon-prod-app)"
            ACTUAL_WORKER_IMAGE="$(docker inspect --format '{{.Config.Image}}' coupon-prod-worker)"

            [ "${ACTUAL_APP_IMAGE}" = "${APP_IMAGE}" ] || { echo "APP image mismatch: expected=${APP_IMAGE}, actual=${ACTUAL_APP_IMAGE}"; exit 1; }
            [ "${ACTUAL_WORKER_IMAGE}" = "${WORKER_IMAGE}" ] || { echo "WORKER image mismatch: expected=${WORKER_IMAGE}, actual=${ACTUAL_WORKER_IMAGE}"; exit 1; }

            docker image prune -f
