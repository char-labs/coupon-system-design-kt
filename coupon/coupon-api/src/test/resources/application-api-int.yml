management:
  health:
    redis:
      enabled: false

jwt:
  secret-key: coupon-api-int-test-secret-key-32bytes

spring:
  main:
    web-application-type: none
  jpa:
    hibernate:
      ddl-auto: create-drop

datasource:
  db:
    core:
      jdbc-url: jdbc:h2:mem:coupon-api-int;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      maximum-pool-size: 30
