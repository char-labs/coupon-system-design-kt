spring.application.name: coupon-system
spring.profiles.active: ${SPRING_PROFILES_ACTIVE:local}

spring:
  config:
    import:
      - db-core.yml
      - redis.yml
      - authentication.yml
      - swagger.yml
      - logging.yml
      - monitoring.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  web.resources.add-mappings: false
  servlet:
    encoding:
      charset: UTF-8
  task:
    execution:
      pool:
        core-size: 10
        max-size: 10
        queue-capacity: 10000
      shutdown:
        await-termination: true
        await-termination-period: 10s

api:
  kafka:
    coupon-issue:
      enabled: true
      topic: coupon.issue.v1
      ack-timeout: 10s
      observation-enabled: true
      topic-partitions: 3
      topic-replicas: 1
      producer-max-in-flight-requests-per-connection: 5
      producer-linger: 5ms
      producer-batch-size-bytes: 65536
      producer-compression-type: lz4
      producer-request-timeout: 5s
      producer-delivery-timeout: 9s
      producer-max-block: 1s
      producer-buffer-memory-bytes: 33554432

server:
  tomcat:
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:30s}
    max-connections: 20000
    threads:
      max: 600
      min-spare: 100
