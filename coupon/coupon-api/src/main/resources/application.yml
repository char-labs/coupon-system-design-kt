spring.application.name: coupon-system
spring.profiles.active: ${SPRING_PROFILES_ACTIVE:local}

spring:
  config:
    import:
      - db-core.yml
      - redis.yml
      - authentication.yml
      - swagger.yml
      - logging.yml
      - monitoring.yml
  web.resources.add-mappings: false
  servlet:
    encoding:
      charset: UTF-8

server:
  tomcat:
    max-connections: 20000
    threads:
      max: 600
      min-spare: 100
