worker:
  outbox:
    enabled: true
    batch-size: 100
    fixed-delay: 500ms
    initial-delay: 0ms
    max-retries: 10
    retry:
      initial-delay: 1s
      max-delay: 5m
      multiplier: 2.0
    dead-alert:
      slack:
        enabled: ${WORKER_OUTBOX_DEAD_SLACK_ENABLED:false}
        webhook-url: ${WORKER_OUTBOX_DEAD_SLACK_WEBHOOK_URL:}
        timeout: ${WORKER_OUTBOX_DEAD_SLACK_TIMEOUT:3s}
  kafka:
    coupon-issue:
      enabled: true
      topic: coupon.issue.v1
      dlq-topic: coupon.issue.v1.dlq
      group-id: coupon-issue-group
      dlq-group-id: coupon-issue-dlq-group
      concurrency: 3
      observation-enabled: true
      topic-partitions: 3
      topic-replicas: 1
      retry:
        max-attempts: 5
        initial-interval: 1s
        multiplier: 2.0
        max-interval: 30s
