spring.application.name: coupon-worker
spring.profiles.active: ${SPRING_PROFILES_ACTIVE:local}

spring:
  config:
    import:
      - db-core.yml
      - logging.yml
      - monitoring.yml
      - worker.yml
  web.resources.add-mappings: false
  servlet:
    encoding:
      charset: UTF-8

server.port: ${WORKER_SERVER_PORT:8081}
