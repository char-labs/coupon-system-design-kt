    <text x="150" y="132" text-anchor="middle" fill="#e0e7ff" font-size="12" font-weight="600">coupon-api (8080)</text>
    <text x="150" y="150" text-anchor="middle" fill="#a5b4fc" font-size="9">/actuator/prometheus</text>
    <text x="150" y="164" text-anchor="middle" fill="#a5b4fc" font-size="9">/health/liveness · /readiness</text>
  </g>

  <!-- Worker Server -->
  <g filter="s3">
    <rect x="270" y="106" width="220" height="70" rx="10" fill="#7c2d12" stroke="#fb923c" stroke-width="1.5"/>
    <text x="380" y="132" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="600">coupon-worker (8081)</text>
    <text x="380" y="150" text-anchor="middle" fill="#fdba74" font-size="9">/actuator/prometheus</text>
    <text x="380" y="164" text-anchor="middle" fill="#fdba74" font-size="9">OutboxWorkerMetrics (Custom)</text>
  </g>

