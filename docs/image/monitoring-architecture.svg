  <line x1="410" y1="374" x2="425" y2="374" stroke="#64748b" stroke-width="1.5" marker-end="url(#m1)"/>
  <line x1="600" y1="374" x2="615" y2="374" stroke="#64748b" stroke-width="1.5" marker-end="url(#m1)"/>
  <line x1="810" y1="374" x2="825" y2="374" stroke="#64748b" stroke-width="1.5" marker-end="url(#m1)"/>

