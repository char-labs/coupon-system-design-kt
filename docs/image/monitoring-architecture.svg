    <text x="660" y="132" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="600">📈 Prometheus</text>
    <text x="660" y="150" text-anchor="middle" fill="#fbbf24" font-size="9">Metrics Scraping</text>
    <text x="660" y="164" text-anchor="middle" fill="#fbbf24" font-size="9">Time Series Storage</text>
  </g>

