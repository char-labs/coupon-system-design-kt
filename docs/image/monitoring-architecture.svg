  <g filter="s3">
    <rect x="850" y="536" width="160" height="48" rx="8" fill="#3b1111" stroke="#ef4444" stroke-width="1"/>
    <text x="930" y="557" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Error Tracking</text>
    <text x="930" y="573" text-anchor="middle" fill="#f87171" font-size="8">Sentry Issues / Error Rate</text>
