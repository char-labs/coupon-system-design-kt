    <text x="140" y="513" text-anchor="middle" fill="#60a5fa" font-size="8">Rate / Latency / Status Code</text>
  </g>
  <g filter="s3">
    <rect x="250" y="476" width="180" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="340" y="497" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="600">JVM Metrics</text>
    <text x="340" y="513" text-anchor="middle" fill="#60a5fa" font-size="8">Memory / GC / Threads</text>
  </g>
  <g filter="s3">
    <rect x="450" y="476" width="180" height="48" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
