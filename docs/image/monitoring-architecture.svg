    <text x="740" y="497" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Redis Operations</text>
    <text x="740" y="513" text-anchor="middle" fill="#f87171" font-size="8">Latency / Hit Rate / Lock Wait</text>
  </g>
  <g filter="s3">
    <rect x="850" y="476" width="160" height="48" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
    <text x="930" y="497" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="600">Coupon Business</text>
    <text x="930" y="513" text-anchor="middle" fill="#6ee7b7" font-size="8">Issue Rate / Stock Level</text>
  </g>

  <!-- Row 2 -->
  <g filter="s3">
    <rect x="50" y="536" width="180" height="48" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
    <text x="140" y="557" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">Outbox Worker</text>
    <text x="140" y="573" text-anchor="middle" fill="#818cf8" font-size="8">Poll / Claimed / Recovered / Dead</text>
