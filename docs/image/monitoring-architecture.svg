<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 580" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="src1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="src2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="m1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="m2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="m3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { fill: #f8fafc; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 16px; }
      .label { font-size: 20px; font-weight: 700; }
      .body { fill: #dbe4f0; font-size: 14px; }
      .meta { fill: #cbd5e1; font-size: 12px; }
    </style>
  </defs>

  <rect width="1360" height="580" rx="28" fill="url(#bg)"/>

  <text x="72" y="72" class="title">모니터링 아키텍처</text>
  <rect x="72" y="82" width="210" height="3" rx="2" fill="#34d399" opacity="0.8"/>
  <text x="72" y="112" class="subtitle">메트릭, 로그, 오류 추적을 따로 보고, 운영 대응이 필요한 알림은 별도로 받는 구성을 보여줍니다.</text>

  <g filter="url(#shadow)">
    <rect x="184" y="156" width="250" height="100" rx="22" fill="url(#src1)" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="926" y="156" width="250" height="100" rx="22" fill="url(#src2)" stroke="#fdba74" stroke-width="1.6"/>
    <rect x="72" y="336" width="360" height="150" rx="24" fill="url(#m1)" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="500" y="336" width="360" height="150" rx="24" fill="url(#m2)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="928" y="336" width="360" height="150" rx="24" fill="url(#m3)" stroke="#fca5a5" stroke-width="1.6"/>
  </g>

  <text x="309" y="196" text-anchor="middle" fill="#dbeafe" class="label">API Server</text>
  <text x="309" y="226" text-anchor="middle" class="meta">요청 처리와 상태 노출</text>

  <text x="1051" y="196" text-anchor="middle" fill="#ffedd5" class="label">Worker</text>
  <text x="1051" y="226" text-anchor="middle" class="meta">백그라운드 처리와 작업 상태</text>

  <text x="252" y="384" text-anchor="middle" fill="#dbeafe" class="label">메트릭</text>
  <text x="252" y="420" text-anchor="middle" class="body">애플리케이션 상태와 처리량을</text>
  <text x="252" y="448" text-anchor="middle" class="body">대시보드로 확인합니다.</text>
  <text x="252" y="472" text-anchor="middle" class="meta">Actuator / Prometheus / Grafana</text>

  <text x="680" y="384" text-anchor="middle" fill="#d1fae5" class="label">로그</text>
  <text x="680" y="420" text-anchor="middle" class="body">애플리케이션 로그를 모아서</text>
  <text x="680" y="448" text-anchor="middle" class="body">검색 가능한 형태로 봅니다.</text>
  <text x="680" y="472" text-anchor="middle" class="meta">Alloy / Loki / Grafana</text>

  <text x="1108" y="384" text-anchor="middle" fill="#fee2e2" class="label">오류 추적과 알림</text>
  <text x="1108" y="420" text-anchor="middle" class="body">예외는 추적하고, 필요한 경우</text>
  <text x="1108" y="448" text-anchor="middle" class="body">운영 알림으로 빠르게 대응합니다.</text>
  <text x="1108" y="472" text-anchor="middle" class="meta">Sentry / Slack</text>

  <line x1="309" y1="256" x2="252" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
  <line x1="309" y1="256" x2="680" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
  <line x1="309" y1="256" x2="1030" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>

  <line x1="1051" y1="256" x2="252" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
  <line x1="1051" y1="256" x2="680" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
  <line x1="1051" y1="256" x2="1108" y2="332" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
</svg>
