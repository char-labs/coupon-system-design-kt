  <g filter="s">
    <rect x="260" y="450" width="520" height="120" rx="14" fill="url(#storageG)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="520" y="476" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Storage Layer (Adapters)</text>

    <rect x="280" y="490" width="145" height="48" rx="8" fill="#0c1929" stroke="#2563eb" stroke-width="1"/>
    <text x="352" y="511" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="600">db-core</text>
    <text x="352" y="527" text-anchor="middle" fill="#60a5fa" font-size="8">JPA Entity &amp; Repository</text>

    <rect x="440" y="490" width="145" height="48" rx="8" fill="#0c1929" stroke="#dc2626" stroke-width="1"/>
    <text x="512" y="511" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">redis</text>
    <text x="512" y="527" text-anchor="middle" fill="#f87171" font-size="8">Lock / Cache / State</text>

    <rect x="600" y="490" width="160" height="48" rx="8" fill="#0c1929" stroke="#2563eb" stroke-width="1"/>
    <text x="680" y="511" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="600">Outbox Event Store</text>
    <text x="680" y="527" text-anchor="middle" fill="#60a5fa" font-size="8">Transactional Outbox</text>
  </g>

  <!-- Arrow: Domain → Storage -->
  <line x1="520" y1="410" x2="520" y2="445" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== External Infra ========== -->
  <!-- MySQL -->
  <g filter="s">
    <rect x="60" y="610" width="160" height="60" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="140" y="637" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">🗄️ MySQL 8</text>
    <text x="140" y="655" text-anchor="middle" fill="#64748b" font-size="9">Source of Truth</text>
  </g>

  <!-- Redis -->
  <g filter="s">
    <rect x="260" y="610" width="160" height="60" rx="12" fill="#3b1111" stroke="#ef4444" stroke-width="1.5"/>
    <text x="340" y="637" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">⚡ Redis 7</text>
    <text x="340" y="655" text-anchor="middle" fill="#64748b" font-size="9">Lua Script / Redisson</text>
  </g>

  <!-- Kafka Cluster -->
  <g filter="s">
    <rect x="460" y="610" width="160" height="60" rx="12" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="540" y="637" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">📨 Kafka Cluster</text>
    <text x="540" y="655" text-anchor="middle" fill="#64748b" font-size="9">KRaft Mode</text>
  </g>

  <!-- DLQ -->
  <g filter="s">
    <rect x="660" y="610" width="160" height="60" rx="12" fill="#3b1111" stroke="#dc2626" stroke-width="1.5"/>
    <text x="740" y="637" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">☠️ DLQ Topic</text>
    <text x="740" y="655" text-anchor="middle" fill="#64748b" font-size="9">coupon.issue.v1-dlt</text>
  </g>

  <!-- Arrows: Storage → External -->
  <line x1="352" y1="570" x2="140" y2="605" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="512" y1="570" x2="340" y2="605" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="680" y1="570" x2="540" y2="605" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <line x1="540" y1="610" x2="660" y2="610" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="600" y="604" text-anchor="middle" fill="#dc2626" font-size="8">retry fail</text>

  <!-- ========== SUPPORT MODULES ========== -->
  <g filter="s">
    <rect x="860" y="450" width="200" height="120" rx="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
    <text x="960" y="476" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">support</text>

    <rect x="878" y="490" width="165" height="28" rx="6" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <text x="960" y="509" text-anchor="middle" fill="#cbd5e1" font-size="10">logging (Logback, Sentry)</text>

    <rect x="878" y="526" width="165" height="28" rx="6" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <text x="960" y="545" text-anchor="middle" fill="#cbd5e1" font-size="10">monitoring (Prometheus)</text>
  </g>

  <!-- Legend -->
  <rect x="860" y="610" width="200" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="960" y="632" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">LEGEND</text>
  <line x1="878" y1="642" x2="910" y2="642" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="918" y="646" fill="#94a3b8" font-size="9">sync call</text>
  <line x1="878" y1="660" x2="910" y2="660" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowAmber)"/>
  <text x="918" y="664" fill="#94a3b8" font-size="9">async event</text>
  <line x1="878" y1="678" x2="910" y2="678" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="918" y="682" fill="#94a3b8" font-size="9">error / DLQ</text>
</svg>