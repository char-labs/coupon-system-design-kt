<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="apiG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/><stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="workerG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/><stop offset="100%" style="stop-color:#431407"/>
    </linearGradient>
    <linearGradient id="domainG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/><stop offset="100%" style="stop-color:#022c22"/>
    </linearGradient>
    <linearGradient id="storageG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#0c1929"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" rx="16" fill="url(#bgG)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">🍽️ YogiEat Coupon System — System Architecture</text>
  <line x1="320" y1="54" x2="780" y2="54" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <!-- Client -->
  <g filter="s">
    <rect x="40" y="80" width="140" height="60" rx="12" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
    <text x="110" y="107" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">👤 Client</text>
    <text x="110" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP Request</text>
  </g>

  <!-- Arrow: Client → API -->
  <line x1="180" y1="110" x2="250" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== API SERVER ========== -->
  <g filter="s">
    <rect x="260" y="72" width="310" height="130" rx="14" fill="url(#apiG)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="415" y="96" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">coupon-api (8080)</text>

    <rect x="278" y="108" width="120" height="36" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
    <text x="338" y="131" text-anchor="middle" fill="#c7d2fe" font-size="10">Controller</text>

    <rect x="278" y="152" width="120" height="36" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
    <text x="338" y="175" text-anchor="middle" fill="#c7d2fe" font-size="10">Spring Security</text>

    <rect x="415" y="108" width="138" height="36" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
    <text x="484" y="131" text-anchor="middle" fill="#c7d2fe" font-size="10">Kafka Publisher</text>

    <rect x="415" y="152" width="138" height="36" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
    <text x="484" y="175" text-anchor="middle" fill="#c7d2fe" font-size="10">Request/Response DTO</text>
  </g>

  <!-- ========== KAFKA ========== -->
  <g filter="s">
    <rect x="640" y="78" width="160" height="56" rx="12" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="720" y="102" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Apache Kafka</text>
    <text x="720" y="120" text-anchor="middle" fill="#a3a3a3" font-size="9">coupon.issue.v1</text>
  </g>

  <!-- Arrow: API → Kafka -->
  <line x1="570" y1="106" x2="635" y2="106" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowAmber)"/>
  <text x="600" y="98" text-anchor="middle" fill="#fbbf24" font-size="8">async</text>

  <!-- ========== WORKER SERVER ========== -->
  <g filter="s">
    <rect x="860" y="72" width="210" height="130" rx="14" fill="url(#workerG)" stroke="#f97316" stroke-width="1.5"/>
    <text x="965" y="96" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">coupon-worker (8081)</text>

    <rect x="878" y="108" width="175" height="36" rx="8" fill="#431407" stroke="#fb923c" stroke-width="1"/>
    <text x="965" y="131" text-anchor="middle" fill="#fed7aa" font-size="10">Kafka Consumer</text>

    <rect x="878" y="152" width="175" height="36" rx="8" fill="#431407" stroke="#fb923c" stroke-width="1"/>
    <text x="965" y="175" text-anchor="middle" fill="#fed7aa" font-size="10">Outbox Poller &amp; Dispatcher</text>
  </g>

  <!-- Arrow: Kafka → Worker -->
  <line x1="800" y1="106" x2="855" y2="106" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- ========== DOMAIN LAYER ========== -->
  <g filter="s">
    <rect x="260" y="240" width="520" height="170" rx="14" fill="url(#domainG)" stroke="#10b981" stroke-width="1.5"/>
    <text x="520" y="266" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">coupon-domain (Clean Architecture Core)</text>

    <rect x="280" y="280" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="335" y="301" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Facade</text>
    <text x="335" y="317" text-anchor="middle" fill="#6ee7b7" font-size="8">Orchestrator</text>

    <rect x="405" y="280" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="460" y="301" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Service</text>
    <text x="460" y="317" text-anchor="middle" fill="#6ee7b7" font-size="8">Business Logic</text>

    <rect x="530" y="280" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="585" y="301" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Domain Model</text>
    <text x="585" y="317" text-anchor="middle" fill="#6ee7b7" font-size="8">Coupon / CouponIssue</text>

    <rect x="655" y="280" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="710" y="301" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Event</text>
    <text x="710" y="317" text-anchor="middle" fill="#6ee7b7" font-size="8">Domain Event</text>

    <rect x="280" y="340" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="335" y="361" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Command</text>
    <text x="335" y="377" text-anchor="middle" fill="#6ee7b7" font-size="8">Input Objects</text>

    <rect x="405" y="340" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="460" y="361" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Repository</text>
    <text x="460" y="377" text-anchor="middle" fill="#6ee7b7" font-size="8">Interface (Port)</text>

    <rect x="530" y="340" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="585" y="361" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Validator</text>
    <text x="585" y="377" text-anchor="middle" fill="#6ee7b7" font-size="8">Eligibility Check</text>

    <rect x="655" y="340" width="110" height="48" rx="8" fill="#022c22" stroke="#34d399" stroke-width="1"/>
    <text x="710" y="361" text-anchor="middle" fill="#a7f3d0" font-size="10" font-weight="600">Enum</text>
    <text x="710" y="377" text-anchor="middle" fill="#6ee7b7" font-size="8">Shared Types</text>
  </g>

  <!-- Arrows: API/Worker → Domain -->
