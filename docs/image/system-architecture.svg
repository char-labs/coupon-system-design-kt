<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 620" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="api" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="redis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="kafka" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="worker" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { fill: #f8fafc; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 16px; }
      .label { font-size: 20px; font-weight: 700; }
      .body { fill: #dbe4f0; font-size: 14px; }
      .meta { fill: #cbd5e1; font-size: 12px; }
      .chip { fill: #e2e8f0; font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1360" height="620" rx="28" fill="url(#bg)"/>

  <text x="72" y="72" class="title">시스템 아키텍처</text>
  <rect x="72" y="82" width="180" height="3" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="72" y="112" class="subtitle">사용자 요청을 API, Redis, Kafka, Worker, Database가 나눠 맡는 구조를 단순하게 보여주는 그림입니다.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="248" width="150" height="96" rx="22" fill="#111827" stroke="#475569" stroke-width="1.4"/>
    <rect x="272" y="222" width="240" height="150" rx="24" fill="url(#api)" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="584" y="138" width="220" height="120" rx="22" fill="url(#redis)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="584" y="336" width="220" height="120" rx="22" fill="url(#kafka)" stroke="#fcd34d" stroke-width="1.6"/>
    <rect x="874" y="222" width="240" height="150" rx="24" fill="url(#worker)" stroke="#fdba74" stroke-width="1.6"/>
    <rect x="1170" y="222" width="140" height="150" rx="22" fill="url(#db)" stroke="#c4b5fd" stroke-width="1.6"/>
    <rect x="874" y="446" width="436" height="96" rx="22" fill="url(#monitor)" stroke="#5eead4" stroke-width="1.6"/>
  </g>

  <text x="147" y="287" text-anchor="middle" fill="#cbd5e1" class="label">Client</text>
  <text x="147" y="316" text-anchor="middle" class="meta">사용자 요청</text>

  <text x="392" y="272" text-anchor="middle" fill="#dbeafe" class="label">API Server</text>
  <text x="392" y="312" text-anchor="middle" class="body">요청을 받고</text>
  <text x="392" y="338" text-anchor="middle" class="body">다음 처리 단계로 전달합니다.</text>

  <text x="694" y="184" text-anchor="middle" fill="#d1fae5" class="label">Redis</text>
  <text x="694" y="220" text-anchor="middle" class="body">빠른 상태 확인</text>

  <text x="694" y="382" text-anchor="middle" fill="#fde68a" class="label">Kafka</text>
  <text x="694" y="418" text-anchor="middle" class="body">요청 완충과 비동기 전달</text>

  <text x="994" y="272" text-anchor="middle" fill="#ffedd5" class="label">Worker</text>
  <text x="994" y="312" text-anchor="middle" class="body">백그라운드에서</text>
  <text x="994" y="338" text-anchor="middle" class="body">실제 발급 작업을 처리합니다.</text>

  <text x="1240" y="286" text-anchor="middle" fill="#ede9fe" class="label">Database</text>
  <text x="1240" y="316" text-anchor="middle" class="meta">최종 결과 저장</text>

  <text x="1092" y="484" text-anchor="middle" fill="#ccfbf1" class="label">Monitoring</text>
  <text x="1092" y="518" text-anchor="middle" class="body">로그, 메트릭, 오류 추적, 운영 알림</text>

  <line x1="222" y1="296" x2="268" y2="296" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="512" y1="264" x2="580" y2="214" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="512" y1="330" x2="580" y2="386" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="804" y1="396" x2="870" y2="316" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="1114" y1="296" x2="1166" y2="296" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="994" y1="372" x2="994" y2="442" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="72" y="570" width="1238" height="28" rx="14" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="124" y="589" class="chip">빠른 요청 수락</text>
  <line x1="264" y1="576" x2="264" y2="592" stroke="#1f2937" stroke-width="1"/>
  <text x="290" y="589" class="chip">중간 완충 구간</text>
  <line x1="454" y1="576" x2="454" y2="592" stroke="#1f2937" stroke-width="1"/>
  <text x="480" y="589" class="chip">백그라운드 처리</text>
  <line x1="674" y1="576" x2="674" y2="592" stroke="#1f2937" stroke-width="1"/>
  <text x="700" y="589" class="chip">최종 저장</text>
  <line x1="824" y1="576" x2="824" y2="592" stroke="#1f2937" stroke-width="1"/>
  <text x="850" y="589" class="chip">운영 가시성</text>
</svg>
