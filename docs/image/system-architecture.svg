<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 580" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Card fills -->
    <linearGradient id="cg0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#052e16"/><stop offset="100%" stop-color="#071a15"/></linearGradient>
    <linearGradient id="cg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1c1107"/><stop offset="100%" stop-color="#1a1207"/></linearGradient>
    <linearGradient id="cg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1c1107"/><stop offset="100%" stop-color="#1a0f05"/></linearGradient>
    <linearGradient id="cg5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <!-- Arrow markers -->
    <marker id="arrGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/></filter>
    <style>
      .title { fill: #f8fafc; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #64748b; font-size: 15px; }
      .label { font-size: 19px; font-weight: 700; }
      .body { fill: #cbd5e1; font-size: 14px; }
      .tech { fill: #475569; font-size: 12px; }
      .note { fill: #64748b; font-size: 13px; }
    </style>
  </defs>

  <rect width="1280" height="580" rx="28" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="190" x2="1280" y2="190" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="380" x2="1280" y2="380" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="426" y1="0" x2="426" y2="580" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="852" y1="0" x2="852" y2="580" stroke="#fff" stroke-width="0.3" opacity="0.04"/>

  <!-- Title -->
  <text x="72" y="66" class="title">시스템 아키텍처</text>
  <rect x="72" y="74" width="140" height="3" rx="2" fill="#6366f1" opacity="0.7"/>
  <text x="72" y="100" class="subtitle">요청 수락은 빠르게, 처리는 안정적으로. API와 Worker를 분리해 트래픽 급증에도 DB 부하를 통제한다.</text>

  <!-- Client -->
  <g filter="url(#shadow)">
    <rect x="52" y="188" width="152" height="104" rx="22" fill="url(#cg0)" stroke="#334155" stroke-width="1.5"/>
  </g>
  <circle cx="88" cy="226" r="5" fill="#94a3b8" opacity="0.6"/>
  <text x="128" y="232" text-anchor="middle" fill="#94a3b8" class="label">Client</text>
  <text x="128" y="272" text-anchor="middle" class="tech">쿠폰 발급 요청</text>

  <!-- API Server -->
  <g filter="url(#shadow)">
    <rect x="262" y="160" width="268" height="160" rx="24" fill="url(#cg1)" stroke="#6366f1" stroke-width="1.8"/>
  </g>
  <circle cx="290" cy="200" r="5" fill="#818cf8" filter="url(#glow)" opacity="0.9"/>
  <text x="396" y="207" text-anchor="middle" fill="#818cf8" class="label">API Server</text>
  <line x1="286" y1="220" x2="506" y2="220" stroke="#6366f1" stroke-width="0.6" opacity="0.35"/>
  <text x="396" y="248" text-anchor="middle" class="body">인증, 요청 검증</text>
  <text x="396" y="272" text-anchor="middle" class="body">Redis 예약 → Kafka 발행</text>
  <text x="396" y="300" text-anchor="middle" class="tech">Spring Boot · JWT · Kafka Producer</text>

  <!-- Redis (upper right) -->
  <g filter="url(#shadow)">
    <rect x="598" y="148" width="220" height="120" rx="22" fill="url(#cg2)" stroke="#10b981" stroke-width="1.8"/>
  </g>
  <circle cx="626" cy="188" r="5" fill="#34d399" filter="url(#glow)" opacity="0.9"/>
  <text x="708" y="195" text-anchor="middle" fill="#34d399" class="label">Redis</text>
  <text x="708" y="224" text-anchor="middle" class="body">재고 가드 + 중복 체크</text>
  <text x="708" y="248" text-anchor="middle" class="tech">Lua Script · Redisson Lock</text>

  <!-- Kafka (lower right of center) -->
  <g filter="url(#shadow)">
    <rect x="598" y="316" width="220" height="120" rx="22" fill="url(#cg3)" stroke="#f59e0b" stroke-width="1.8"/>
  </g>
  <circle cx="626" cy="356" r="5" fill="#fbbf24" filter="url(#glow)" opacity="0.9"/>
  <text x="708" y="363" text-anchor="middle" fill="#fbbf24" class="label">Kafka</text>
  <text x="708" y="392" text-anchor="middle" class="body">트래픽 버퍼링 + 순서 보장</text>
  <text x="708" y="416" text-anchor="middle" class="tech">KRaft · 3 Partitions · Idempotent</text>

  <!-- Worker -->
  <g filter="url(#shadow)">
    <rect x="886" y="160" width="268" height="160" rx="24" fill="url(#cg4)" stroke="#f97316" stroke-width="1.8"/>
  </g>
  <circle cx="914" cy="200" r="5" fill="#fb923c" filter="url(#glow)" opacity="0.9"/>
  <text x="1020" y="207" text-anchor="middle" fill="#fb923c" class="label">Worker</text>
  <line x1="910" y1="220" x2="1130" y2="220" stroke="#f97316" stroke-width="0.6" opacity="0.35"/>
  <text x="1020" y="248" text-anchor="middle" class="body">분산 락으로 수량 보호</text>
  <text x="1020" y="272" text-anchor="middle" class="body">발급 실행 + 재시도 / DLQ</text>
  <text x="1020" y="300" text-anchor="middle" class="tech">Kafka Consumer · Redisson Lock</text>

  <!-- MySQL -->
  <g filter="url(#shadow)">
    <rect x="886" y="368" width="268" height="108" rx="22" fill="url(#cg5)" stroke="#3b82f6" stroke-width="1.8"/>
  </g>
  <circle cx="914" cy="408" r="5" fill="#60a5fa" filter="url(#glow)" opacity="0.9"/>
  <text x="1020" y="415" text-anchor="middle" fill="#60a5fa" class="label">MySQL</text>
  <text x="1020" y="444" text-anchor="middle" class="body">최종 발급 결과 저장</text>
  <text x="1020" y="462" text-anchor="middle" class="tech">Unique 제약 · TSID · Flyway</text>

  <!-- Arrows -->
  <line x1="204" y1="240" x2="258" y2="240" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>

  <!-- API → Redis -->
  <line x1="530" y1="220" x2="594" y2="208" stroke="#10b981" stroke-width="2.2" marker-end="url(#arrGreen)"/>

  <!-- API → Kafka (dashed, async) -->
  <line x1="530" y1="280" x2="594" y2="356" stroke="#f59e0b" stroke-width="2.2" stroke-dasharray="7,4" marker-end="url(#arrOrange)"/>
  <text x="542" y="320" fill="#f59e0b" font-size="11px" font-weight="700">async</text>

  <!-- Kafka → Worker -->
  <line x1="818" y1="376" x2="882" y2="276" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>

  <!-- Worker → MySQL -->
  <line x1="1020" y1="320" x2="1020" y2="364" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>

  <!-- Bottom bar -->
  <rect x="72" y="508" width="1136" height="46" rx="16" fill="#161b27" stroke="#1e293b" stroke-width="1.2"/>
  <circle cx="112" cy="531" r="4" fill="#6366f1" opacity="0.8"/>
  <text x="128" y="535" fill="#94a3b8" font-size="13px">API는 DB write 없이 빠르게 응답</text>
  <line x1="360" y1="516" x2="360" y2="546" stroke="#1e293b" stroke-width="1"/>
  <circle cx="392" cy="531" r="4" fill="#f59e0b" opacity="0.8"/>
  <text x="408" y="535" fill="#94a3b8" font-size="13px">Kafka로 트래픽을 평탄화</text>
  <line x1="620" y1="516" x2="620" y2="546" stroke="#1e293b" stroke-width="1"/>
  <circle cx="652" cy="531" r="4" fill="#f97316" opacity="0.8"/>
  <text x="668" y="535" fill="#94a3b8" font-size="13px">Worker가 락 + DB write를 책임</text>
  <line x1="920" y1="516" x2="920" y2="546" stroke="#1e293b" stroke-width="1"/>
  <circle cx="952" cy="531" r="4" fill="#ef4444" opacity="0.8"/>
  <text x="968" y="535" fill="#94a3b8" font-size="13px">실패 시 DLQ + Slack 알림</text>
</svg>
