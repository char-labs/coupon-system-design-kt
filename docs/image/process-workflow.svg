<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="a1" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="a4" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="a5" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc"/>
    </marker>
  </defs>

  <rect width="1200" height="900" rx="16" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">🎫 선착순 쿠폰 발급 Flow (FCFS Coupon Issuance)</text>
  <line x1="330" y1="52" x2="870" y2="52" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <!-- ===== PHASE 1: Intake (Fast Path) ===== -->
  <rect x="30" y="68" width="550" height="350" rx="14" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="50" y="90" fill="#a5b4fc" font-size="14" font-weight="700">PHASE 1 — Intake Pipeline (API Server)</text>
  <text x="50" y="108" fill="#64748b" font-size="10">CouponIssueIntakeFacade · HTTP 202 Accepted · 밀리초 응답</text>

  <!-- Step 1 -->
  <g filter="sh">
    <rect x="50" y="124" width="180" height="52" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="140" y="147" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">① POST /coupon-issues</text>
    <text x="140" y="163" text-anchor="middle" fill="#a5b4fc" font-size="9">JWT 인증 + {couponId}</text>
  </g>

  <!-- Step 2 -->
  <g filter="sh">
    <rect x="50" y="196" width="180" height="52" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <text x="140" y="219" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">② 쿠폰 상세 캐시 조회</text>
    <text x="140" y="235" text-anchor="middle" fill="#6ee7b7" font-size="9">Redis Cache (TTL 60min)</text>
  </g>
  <line x1="140" y1="176" x2="140" y2="191" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Step 3 -->
  <g filter="sh">
    <rect x="50" y="268" width="180" height="70" rx="10" fill="#3b1111" stroke="#f87171" stroke-width="1.5"/>
    <text x="140" y="291" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="600">③ Redis 선착순 예약</text>
    <text x="140" y="306" text-anchor="middle" fill="#f87171" font-size="9">Lua Script (Atomic)</text>
    <text x="140" y="320" text-anchor="middle" fill="#fca5a5" font-size="8">SISMEMBER → GET → INCR → SADD</text>
  </g>
  <line x1="140" y1="248" x2="140" y2="263" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Decision Diamond -->
  <polygon points="350,272 430,308 350,344 270,308" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="350" y="305" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Reserve</text>
  <text x="350" y="319" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Result?</text>
  <line x1="230" y1="303" x2="265" y2="303" stroke="#f87171" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- DUPLICATE -->
  <g filter="sh">
    <rect x="290" y="360" width="120" height="40" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
    <text x="350" y="384" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">DUPLICATE</text>
  </g>
  <line x1="350" y1="344" x2="350" y2="355" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- SOLD_OUT -->
  <g filter="sh">
    <rect x="160" y="360" width="110" height="40" rx="8" fill="#3b1111" stroke="#ef4444" stroke-width="1"/>
    <text x="215" y="384" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">SOLD_OUT</text>
  </g>
  <line x1="270" y1="308" x2="215" y2="308" stroke="#64748b" stroke-width="0.5"/>
  <line x1="215" y1="308" x2="215" y2="355" stroke="#f87171" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- SUCCESS → Kafka -->
  <g filter="sh">
    <rect x="448" y="280" width="120" height="56" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="508" y="303" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">④ Kafka Publish</text>
    <text x="508" y="319" text-anchor="middle" fill="#fbbf24" font-size="9">coupon.issue.v1</text>
    <text x="508" y="331" text-anchor="middle" fill="#fbbf24" font-size="8">+ PublishReceipt 확인</text>
  </g>
  <line x1="430" y1="308" x2="443" y2="308" stroke="#34d399" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="438" y="300" fill="#34d399" font-size="8">SUCCESS</text>

  <!-- ===== PHASE 2: Execution Pipeline ===== -->
  <rect x="610" y="68" width="560" height="350" rx="14" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="630" y="90" fill="#fdba74" font-size="14" font-weight="700">PHASE 2 — Execution Pipeline (Worker)</text>
  <text x="630" y="108" fill="#64748b" font-size="10">CouponIssueExecutionFacade · Sealed Result Routing · 정합성 보장</text>

  <!-- Step 5 -->
  <g filter="sh">
    <rect x="630" y="124" width="210" height="52" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="735" y="147" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">⑤ Kafka Consume</text>
    <text x="735" y="163" text-anchor="middle" fill="#fbbf24" font-size="9">CouponIssueKafkaListener</text>
  </g>

  <!-- Step 5.5: Rate Limiter -->
  <g filter="sh">
    <rect x="860" y="124" width="160" height="52" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="940" y="147" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Rate Limiter</text>
    <text x="940" y="163" text-anchor="middle" fill="#a5b4fc" font-size="9">100 permits/sec (Redis)</text>
  </g>
  <line x1="840" y1="150" x2="855" y2="150" stroke="#c084fc" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Kafka bridge arrow -->
  <path d="M508,336 L508,370 Q508,380 518,380 L620,380 Q630,380 630,370 L630,120 Q630,110 640,110 L735,110" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.3"/>
  <line x1="735" y1="110" x2="735" y2="119" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Step 6: @WithDistributedLock -->
  <g filter="sh">
    <rect x="630" y="196" width="210" height="52" rx="10" fill="#3b1111" stroke="#f87171" stroke-width="1.5"/>
    <text x="735" y="219" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="600">⑥ @WithDistributedLock</text>
    <text x="735" y="235" text-anchor="middle" fill="#f87171" font-size="9">AOP Aspect · Redisson (5s timeout)</text>
  </g>
  <line x1="735" y1="176" x2="735" y2="191" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Step 7 -->
  <g filter="sh">
    <rect x="630" y="268" width="210" height="52" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="735" y="291" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">⑦ DB 수량 차감 + INSERT</text>
    <text x="735" y="307" text-anchor="middle" fill="#60a5fa" font-size="9">LockingExecutor.execute()</text>
  </g>
  <line x1="735" y1="248" x2="735" y2="263" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Step 8: Sealed Result -->
  <g filter="sh">
    <rect x="630" y="340" width="210" height="60" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="735" y="363" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">⑧ ExecutionResult Routing</text>
    <text x="735" y="380" text-anchor="middle" fill="#a5b4fc" font-size="8">Succeeded → ACK</text>
    <text x="735" y="392" text-anchor="middle" fill="#a5b4fc" font-size="8">Retry → Exception · Rejected → Release</text>
  </g>
  <line x1="735" y1="320" x2="735" y2="335" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Domain Event + Outbox -->
  <g filter="sh">
    <rect x="870" y="268" width="280" height="52" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <text x="1010" y="291" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">⑨ Domain Event + Outbox 저장</text>
    <text x="1010" y="307" text-anchor="middle" fill="#6ee7b7" font-size="9">CouponLifecycleEvent → t_outbox_event (같은 Tx)</text>
  </g>
  <line x1="840" y1="294" x2="865" y2="294" stroke="#34d399" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- ===== PHASE 3: Error Handling ===== -->
  <rect x="30" y="440" width="1140" height="140" rx="14" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="50" y="465" fill="#fca5a5" font-size="14" font-weight="700">ERROR HANDLING &amp; COMPENSATION</text>
  <text x="50" y="483" fill="#64748b" font-size="10">CouponIssueExecutionResult (Sealed Class) 기반 분기</text>

  <g filter="sh">
    <rect x="50" y="498" width="200" height="56" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <text x="150" y="521" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">Succeeded</text>
    <text x="150" y="541" text-anchor="middle" fill="#6ee7b7" font-size="9">→ Kafka ACK · 발급 완료</text>
  </g>

  <g filter="sh">
    <rect x="280" y="498" width="200" height="56" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="380" y="521" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">AlreadyIssued</text>
    <text x="380" y="541" text-anchor="middle" fill="#fbbf24" font-size="9">→ Idempotent ACK (무시)</text>
  </g>

  <g filter="sh">
    <rect x="510" y="498" width="200" height="56" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="610" y="521" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Retry</text>
    <text x="610" y="541" text-anchor="middle" fill="#a5b4fc" font-size="9">→ RetryableException 발생</text>
  </g>

  <g filter="sh">
    <rect x="740" y="498" width="200" height="56" rx="10" fill="#3b1111" stroke="#ef4444" stroke-width="1.5"/>
    <text x="840" y="521" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="600">Rejected</text>
    <text x="840" y="541" text-anchor="middle" fill="#f87171" font-size="9">→ Redis Release + ACK (포기)</text>
  </g>

  <g filter="sh">
    <rect x="970" y="498" width="190" height="56" rx="10" fill="#1e1b4b" stroke="#dc2626" stroke-width="1.5"/>
    <text x="1065" y="521" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Max Retry 초과</text>
    <text x="1065" y="541" text-anchor="middle" fill="#ef4444" font-size="9">→ DLQ + Slack 알림</text>
  </g>

  <!-- ===== PHASE 4: Outbox ===== -->
  <rect x="30" y="605" width="1140" height="120" rx="14" fill="none" stroke="#818cf8" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="50" y="630" fill="#c4b5fd" font-size="14" font-weight="700">OUTBOX PATTERN — Eventual Consistency</text>
  <text x="50" y="648" fill="#64748b" font-size="10">OutboxPoller (500ms) · Batch 100 · Recovery 30s · Exponential Backoff (1s ~ 5m)</text>

  <g filter="sh">
    <rect x="50" y="660" width="170" height="48" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="135" y="681" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Outbox Poller</text>
    <text x="135" y="697" text-anchor="middle" fill="#a5b4fc" font-size="9">Claim + Recover</text>
  </g>
  <g filter="sh">
    <rect x="250" y="660" width="170" height="48" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="335" y="681" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Dispatcher</text>
    <text x="335" y="697" text-anchor="middle" fill="#a5b4fc" font-size="9">Handler Registry 기반</text>
  </g>
  <g filter="sh">
    <rect x="450" y="660" width="170" height="48" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <text x="535" y="681" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">SUCCEEDED</text>
    <text x="535" y="697" text-anchor="middle" fill="#6ee7b7" font-size="9">이벤트 처리 완료</text>
  </g>
  <g filter="sh">
    <rect x="650" y="660" width="170" height="48" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="735" y="681" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">Reschedule</text>
    <text x="735" y="697" text-anchor="middle" fill="#fbbf24" font-size="9">Backoff 후 재시도</text>
  </g>
  <g filter="sh">
    <rect x="850" y="660" width="170" height="48" rx="10" fill="#3b1111" stroke="#ef4444" stroke-width="1.5"/>
    <text x="935" y="681" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="600">DEAD</text>
    <text x="935" y="697" text-anchor="middle" fill="#f87171" font-size="9">Slack 알림 + 수동 처리</text>
  </g>
  <g filter="sh">
    <rect x="1050" y="660" width="110" height="48" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="1105" y="681" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">Metrics</text>
    <text x="1105" y="697" text-anchor="middle" fill="#a5b4fc" font-size="8">Prometheus</text>
  </g>

  <line x1="220" y1="684" x2="245" y2="684" stroke="#c084fc" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="420" y1="684" x2="445" y2="684" stroke="#34d399" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="620" y1="684" x2="645" y2="684" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="820" y1="684" x2="845" y2="684" stroke="#f87171" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="1020" y1="684" x2="1045" y2="684" stroke="#c084fc" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- ===== CONCURRENCY LAYERS ===== -->
  <rect x="30" y="750" width="1140" height="130" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="50" y="775" fill="#93c5fd" font-size="14" font-weight="700">동시성 제어 4-Layer Strategy</text>

  <g filter="sh">
    <rect x="50" y="790" width="250" height="68" rx="10" fill="#3b1111" stroke="#ef4444" stroke-width="1.2"/>
    <text x="175" y="815" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">L1: Redis Lua Script</text>
    <text x="175" y="832" text-anchor="middle" fill="#f87171" font-size="9">Optimistic · Atomic reserve()</text>
    <text x="175" y="847" text-anchor="middle" fill="#64748b" font-size="8">DUPLICATE / SOLD_OUT 즉시 거절</text>
  </g>

  <g filter="sh">
    <rect x="325" y="790" width="250" height="68" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="450" y="815" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">L2: @WithDistributedLock</text>
    <text x="450" y="832" text-anchor="middle" fill="#fbbf24" font-size="9">Pessimistic · AOP Aspect (Redisson)</text>
    <text x="450" y="847" text-anchor="middle" fill="#64748b" font-size="8">Worker 수량 차감 보호</text>
  </g>

  <g filter="sh">
    <rect x="600" y="790" width="250" height="68" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="725" y="815" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">L3: DB Unique + Row Lock</text>
    <text x="725" y="832" text-anchor="middle" fill="#60a5fa" font-size="9">UK(user_id, coupon_id) · TSID PK</text>
    <text x="725" y="847" text-anchor="middle" fill="#64748b" font-size="8">최종 정합성 보장 (Source of Truth)</text>
  </g>

  <g filter="sh">
    <rect x="875" y="790" width="280" height="68" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
    <text x="1015" y="815" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">L4: Kafka Partition + Rate Limiter</text>
    <text x="1015" y="832" text-anchor="middle" fill="#6ee7b7" font-size="9">Partition ordering · 100 permits/sec</text>
    <text x="1015" y="847" text-anchor="middle" fill="#64748b" font-size="8">메시지 순서 보장 + 처리량 제어</text>
  </g>
</svg>