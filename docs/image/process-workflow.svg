<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <linearGradient id="s2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#052e16"/><stop offset="100%" stop-color="#071a15"/></linearGradient>
    <linearGradient id="s3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1c1107"/><stop offset="100%" stop-color="#1a1207"/></linearGradient>
    <linearGradient id="s4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1c1107"/><stop offset="100%" stop-color="#1a0f05"/></linearGradient>
    <linearGradient id="s5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <!-- Step accent top bars -->
    <marker id="arrGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/></filter>
    <style>
      .title { fill: #f8fafc; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #64748b; font-size: 15px; }
      .step { font-size: 17px; font-weight: 700; }
      .body { fill: #cbd5e1; font-size: 14px; }
      .tech { fill: #475569; font-size: 12px; }
      .note { fill: #64748b; font-size: 13px; }
    </style>
  </defs>

  <rect width="1280" height="600" rx="28" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="256" y1="0" x2="256" y2="600" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="512" y1="0" x2="512" y2="600" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="768" y1="0" x2="768" y2="600" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="1024" y1="0" x2="1024" y2="600" stroke="#fff" stroke-width="0.3" opacity="0.04"/>

  <!-- Title -->
  <text x="72" y="66" class="title">쿠폰 발급 흐름도</text>
  <rect x="72" y="74" width="160" height="3" rx="2" fill="#6366f1" opacity="0.7"/>
  <text x="72" y="100" class="subtitle">빠른 수락 → 비동기 처리 → DB 반영을 분리하고, 동시성 제어를 4단계 레이어로 보장한다.</text>

  <!-- === Step Cards === -->
  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="52" y="140" width="212" height="284" rx="24" fill="url(#s1)" stroke="#6366f1" stroke-width="1.8"/>
  </g>
  <circle cx="52" cy="282" r="10" fill="#6366f1" opacity="0.15"/>
  <!-- Number badge -->
  <circle cx="80" cy="172" r="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="177" text-anchor="middle" fill="#818cf8" font-size="13px" font-weight="700">1</text>
  <text x="158" y="178" text-anchor="middle" fill="#818cf8" class="step">요청 수신</text>
  <line x1="72" y1="193" x2="240" y2="193" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
  <text x="158" y="224" text-anchor="middle" class="body">사용자가 쿠폰</text>
  <text x="158" y="248" text-anchor="middle" class="body">발급을 요청</text>
  <text x="158" y="284" text-anchor="middle" class="body">JWT 인증 확인 후</text>
  <text x="158" y="308" text-anchor="middle" class="body">빠른 수락이 목표</text>
  <line x1="72" y1="332" x2="240" y2="332" stroke="#6366f1" stroke-width="0.6" opacity="0.25"/>
  <text x="158" y="358" text-anchor="middle" class="tech">Spring Security</text>
  <text x="158" y="376" text-anchor="middle" class="tech">HTTP 202 Accepted</text>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="290" y="140" width="212" height="284" rx="24" fill="url(#s2)" stroke="#10b981" stroke-width="1.8"/>
  </g>
  <circle cx="318" cy="172" r="14" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="318" y="177" text-anchor="middle" fill="#34d399" font-size="13px" font-weight="700">2</text>
  <text x="396" y="178" text-anchor="middle" fill="#34d399" class="step">Redis 검증</text>
  <line x1="310" y1="193" x2="478" y2="193" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <text x="396" y="224" text-anchor="middle" class="body">중복 요청 체크</text>
  <text x="396" y="248" text-anchor="middle" class="body">+ 재고 가드</text>
  <text x="396" y="284" text-anchor="middle" class="body">Lua Script로</text>
  <text x="396" y="308" text-anchor="middle" class="body">원자적 예약 처리</text>
  <line x1="310" y1="332" x2="478" y2="332" stroke="#10b981" stroke-width="0.6" opacity="0.25"/>
  <text x="396" y="358" text-anchor="middle" class="tech">Redis Lua Script</text>
  <text x="396" y="376" text-anchor="middle" class="tech">SISMEMBER + INCR</text>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="528" y="140" width="212" height="284" rx="24" fill="url(#s3)" stroke="#f59e0b" stroke-width="1.8"/>
  </g>
  <circle cx="556" cy="172" r="14" fill="#1c1107" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="556" y="177" text-anchor="middle" fill="#fbbf24" font-size="13px" font-weight="700">3</text>
  <text x="634" y="178" text-anchor="middle" fill="#fbbf24" class="step">Kafka 큐잉</text>
  <line x1="548" y1="193" x2="716" y2="193" stroke="#f59e0b" stroke-width="0.6" opacity="0.3"/>
  <text x="634" y="224" text-anchor="middle" class="body">요청을 비동기</text>
  <text x="634" y="248" text-anchor="middle" class="body">큐에 넣어 평탄화</text>
  <text x="634" y="284" text-anchor="middle" class="body">API와 Worker</text>
  <text x="634" y="308" text-anchor="middle" class="body">처리를 분리</text>
  <line x1="548" y1="332" x2="716" y2="332" stroke="#f59e0b" stroke-width="0.6" opacity="0.25"/>
  <text x="634" y="358" text-anchor="middle" class="tech">Kafka · 3 Partitions</text>
  <text x="634" y="376" text-anchor="middle" class="tech">Idempotent Producer</text>

  <!-- Step 4 -->
  <g filter="url(#shadow)">
    <rect x="766" y="140" width="212" height="284" rx="24" fill="url(#s4)" stroke="#f97316" stroke-width="1.8"/>
  </g>
  <circle cx="794" cy="172" r="14" fill="#1c1107" stroke="#f97316" stroke-width="1.5"/>
  <text x="794" y="177" text-anchor="middle" fill="#fb923c" font-size="13px" font-weight="700">4</text>
  <text x="872" y="178" text-anchor="middle" fill="#fb923c" class="step">Worker 실행</text>
  <line x1="786" y1="193" x2="954" y2="193" stroke="#f97316" stroke-width="0.6" opacity="0.3"/>
  <text x="872" y="224" text-anchor="middle" class="body">분산 락 획득 후</text>
  <text x="872" y="248" text-anchor="middle" class="body">실제 발급 수행</text>
  <text x="872" y="284" text-anchor="middle" class="body">결과별 분기 처리</text>
  <text x="872" y="308" text-anchor="middle" class="body">(성공/재시도/거절)</text>
  <line x1="786" y1="332" x2="954" y2="332" stroke="#f97316" stroke-width="0.6" opacity="0.25"/>
  <text x="872" y="358" text-anchor="middle" class="tech">Redisson Lock</text>
  <text x="872" y="376" text-anchor="middle" class="tech">Sealed Result Routing</text>

  <!-- Step 5 -->
  <g filter="url(#shadow)">
    <rect x="1004" y="140" width="224" height="284" rx="24" fill="url(#s5)" stroke="#3b82f6" stroke-width="1.8"/>
  </g>
  <circle cx="1032" cy="172" r="14" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1032" y="177" text-anchor="middle" fill="#60a5fa" font-size="13px" font-weight="700">5</text>
  <text x="1116" y="178" text-anchor="middle" fill="#60a5fa" class="step">DB 저장</text>
  <line x1="1024" y1="193" x2="1204" y2="193" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>
  <text x="1116" y="224" text-anchor="middle" class="body">수량 차감 +</text>
  <text x="1116" y="248" text-anchor="middle" class="body">발급 레코드 INSERT</text>
  <text x="1116" y="284" text-anchor="middle" class="body">Outbox 이벤트를</text>
  <text x="1116" y="308" text-anchor="middle" class="body">같은 트랜잭션에 저장</text>
  <line x1="1024" y1="332" x2="1204" y2="332" stroke="#3b82f6" stroke-width="0.6" opacity="0.25"/>
  <text x="1116" y="358" text-anchor="middle" class="tech">MySQL · UK(user, coupon)</text>
  <text x="1116" y="376" text-anchor="middle" class="tech">TSID · Flyway</text>

  <!-- Flow Arrows -->
  <line x1="264" y1="282" x2="286" y2="282" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>
  <line x1="502" y1="282" x2="524" y2="282" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>
  <line x1="740" y1="282" x2="762" y2="282" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>
  <line x1="978" y1="282" x2="1000" y2="282" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>

  <!-- Concurrency Layer Bar -->
  <rect x="52" y="460" width="1176" height="112" rx="22" fill="#161b27" stroke="#1e293b" stroke-width="1.2"/>
  <text x="72" y="492" fill="#94a3b8" font-size="14px" font-weight="700">동시성 제어 4-Layer</text>

  <rect x="72" y="506" width="260" height="42" rx="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <circle cx="96" cy="527" r="5" fill="#818cf8" filter="url(#glow)" opacity="0.8"/>
  <text x="202" y="532" text-anchor="middle" fill="#818cf8" font-size="13px" font-weight="700">L1  Redis Lua (Optimistic)</text>

  <rect x="356" y="506" width="260" height="42" rx="14" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <circle cx="380" cy="527" r="5" fill="#34d399" filter="url(#glow)" opacity="0.8"/>
  <text x="486" y="532" text-anchor="middle" fill="#34d399" font-size="13px" font-weight="700">L2  Distributed Lock</text>

  <rect x="640" y="506" width="276" height="42" rx="14" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.2"/>
  <circle cx="664" cy="527" r="5" fill="#60a5fa" filter="url(#glow)" opacity="0.8"/>
  <text x="778" y="532" text-anchor="middle" fill="#60a5fa" font-size="13px" font-weight="700">L3  DB Unique + Row Lock</text>

  <rect x="940" y="506" width="288" height="42" rx="14" fill="#1c1107" stroke="#f59e0b" stroke-width="1.2"/>
  <circle cx="964" cy="527" r="5" fill="#fbbf24" filter="url(#glow)" opacity="0.8"/>
  <text x="1084" y="532" text-anchor="middle" fill="#fbbf24" font-size="13px" font-weight="700">L4  Kafka Partition + Rate Limit</text>
</svg>
