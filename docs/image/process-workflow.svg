<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 560" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="c5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { fill: #f8fafc; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 16px; }
      .label { font-size: 20px; font-weight: 700; }
      .body { fill: #dbe4f0; font-size: 14px; }
      .meta { fill: #cbd5e1; font-size: 12px; }
      .chip { fill: #e2e8f0; font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1360" height="560" rx="28" fill="url(#bg)"/>

  <text x="72" y="72" class="title">쿠폰 발급 흐름</text>
  <rect x="72" y="82" width="190" height="3" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="72" y="112" class="subtitle">요청을 빠르게 받고, 중간 완충 구간을 거쳐, 백그라운드에서 최종 저장까지 이어지는 큰 흐름입니다.</text>

  <g filter="url(#shadow)">
    <rect x="48" y="176" width="220" height="210" rx="24" fill="url(#c1)" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="304" y="176" width="220" height="210" rx="24" fill="url(#c2)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="560" y="176" width="220" height="210" rx="24" fill="url(#c3)" stroke="#fcd34d" stroke-width="1.6"/>
    <rect x="816" y="176" width="220" height="210" rx="24" fill="url(#c4)" stroke="#fdba74" stroke-width="1.6"/>
    <rect x="1072" y="176" width="240" height="210" rx="24" fill="url(#c5)" stroke="#c4b5fd" stroke-width="1.6"/>
  </g>

  <text x="158" y="228" text-anchor="middle" fill="#dbeafe" class="label">1. 사용자 요청</text>
  <text x="158" y="270" text-anchor="middle" class="body">API 서버가 쿠폰 발급 요청을 받습니다.</text>
  <text x="158" y="300" text-anchor="middle" class="body">사용자에게는 빠른 응답 경험을 주는 구간입니다.</text>
  <text x="158" y="338" text-anchor="middle" class="meta">Client → API Server</text>

  <text x="414" y="228" text-anchor="middle" fill="#d1fae5" class="label">2. Redis 확인</text>
  <text x="414" y="270" text-anchor="middle" class="body">중복 요청이나 수량 상태를</text>
  <text x="414" y="300" text-anchor="middle" class="body">빠르게 확인하는 단계입니다.</text>
  <text x="414" y="338" text-anchor="middle" class="meta">빠른 상태 확인</text>

  <text x="670" y="228" text-anchor="middle" fill="#fde68a" class="label">3. Kafka 전달</text>
  <text x="670" y="270" text-anchor="middle" class="body">요청을 메시지 큐로 넘겨</text>
  <text x="670" y="300" text-anchor="middle" class="body">갑작스러운 트래픽을 완충합니다.</text>
  <text x="670" y="338" text-anchor="middle" class="meta">비동기 버퍼</text>

  <text x="926" y="228" text-anchor="middle" fill="#ffedd5" class="label">4. Worker 처리</text>
  <text x="926" y="270" text-anchor="middle" class="body">백그라운드 워커가</text>
  <text x="926" y="300" text-anchor="middle" class="body">실제 발급 작업을 차례대로 처리합니다.</text>
  <text x="926" y="338" text-anchor="middle" class="meta">비동기 실행</text>

  <text x="1192" y="228" text-anchor="middle" fill="#ede9fe" class="label">5. 결과 저장</text>
  <text x="1192" y="270" text-anchor="middle" class="body">최종 발급 결과를</text>
  <text x="1192" y="300" text-anchor="middle" class="body">데이터베이스에 저장합니다.</text>
  <text x="1192" y="338" text-anchor="middle" class="meta">Worker → Database</text>

  <line x1="268" y1="282" x2="300" y2="282" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="524" y1="282" x2="556" y2="282" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="780" y1="282" x2="812" y2="282" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="1036" y1="282" x2="1068" y2="282" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="72" y="442" width="1216" height="52" rx="18" fill="#111827" stroke="#1f2937" stroke-width="1.2"/>
  <rect x="96" y="456" width="370" height="24" rx="12" fill="#172554" stroke="#60a5fa" stroke-width="1"/>
  <rect x="494" y="456" width="370" height="24" rx="12" fill="#451a03" stroke="#fbbf24" stroke-width="1"/>
  <rect x="892" y="456" width="372" height="24" rx="12" fill="#2e1065" stroke="#c4b5fd" stroke-width="1"/>

  <text x="281" y="473" text-anchor="middle" class="chip">빠른 요청 수락</text>
  <text x="679" y="473" text-anchor="middle" class="chip">메시지 큐로 트래픽 완충</text>
  <text x="1078" y="473" text-anchor="middle" class="chip">백그라운드에서 안정적으로 처리</text>
</svg>
