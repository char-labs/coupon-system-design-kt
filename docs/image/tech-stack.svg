<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card1g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card2g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1107"/>
      <stop offset="100%" stop-color="#1a1207"/>
    </linearGradient>
    <linearGradient id="card3g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#071a15"/>
    </linearGradient>
    <linearGradient id="card4g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#190a2e"/>
    </linearGradient>
    <linearGradient id="accentLine1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
    <style>
      .title { fill: #f8fafc; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #64748b; font-size: 15px; }
      .card-title { font-size: 19px; font-weight: 700; }
      .body { fill: #cbd5e1; font-size: 14px; }
      .note { fill: #64748b; font-size: 13px; }
      .pill { font-size: 11px; font-weight: 700; }
      .dot { }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="620" rx="28" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="200" x2="1280" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="400" x2="1280" y2="400" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="320" y1="0" x2="320" y2="620" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="640" y1="0" x2="640" y2="620" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="960" y1="0" x2="960" y2="620" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Title area -->
  <text x="72" y="70" class="title">기술 스택</text>
  <!-- Accent underline -->
  <rect x="72" y="78" width="120" height="3" rx="2" fill="url(#accentLine1)"/>
  <text x="72" y="106" class="subtitle">고트래픽 수락 → 비동기 처리 → DB 반영 → 운영 대응 흐름에 맞춰 기술을 선택했다.</text>

  <!-- ===== Card 1: Backend Core ===== -->
  <g filter="url(#shadow)">
    <rect x="72" y="144" width="272" height="296" rx="24" fill="url(#card1g)" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <!-- Top accent line -->
  <!-- Glow dot -->
  <circle cx="96" cy="186" r="5" fill="#818cf8" filter="url(#glow2)" opacity="0.9"/>
  <text x="112" y="192" fill="#818cf8" class="card-title">Backend Core</text>
  <line x1="96" y1="206" x2="320" y2="206" stroke="#6366f1" stroke-width="0.6" opacity="0.4"/>
  <text x="100" y="234" class="body">Kotlin + Spring Boot 4</text>
  <text x="100" y="260" class="body">Spring Security (JWT)</text>
  <text x="100" y="286" class="body">Spring Kafka</text>
  <text x="100" y="312" class="body">JPA + Kotlin-JDSL</text>
  <text x="100" y="338" class="body">OpenAPI / Swagger</text>
  <line x1="96" y1="358" x2="320" y2="358" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
  <text x="100" y="384" class="note">API 개발 + 타입 안전한 쿼리</text>
  <text x="100" y="402" class="note">+ 비동기 메시징 기반</text>

  <!-- ===== Card 2: Data & Messaging ===== -->
  <g filter="url(#shadow)">
    <rect x="360" y="144" width="272" height="296" rx="24" fill="url(#card2g)" stroke="#f97316" stroke-width="1.5"/>
  </g>
  <circle cx="384" cy="186" r="5" fill="#fb923c" filter="url(#glow2)" opacity="0.9"/>
  <text x="400" y="192" fill="#fb923c" class="card-title">Data &amp; Messaging</text>
  <line x1="384" y1="206" x2="608" y2="206" stroke="#f97316" stroke-width="0.6" opacity="0.4"/>
  <text x="388" y="234" class="body">MySQL 8 + Flyway</text>
  <text x="388" y="260" class="body">Redis 7 (Redisson)</text>
  <text x="388" y="286" class="body">Apache Kafka (KRaft)</text>
  <text x="388" y="312" class="body">TSID (Snowflake ID)</text>
  <text x="388" y="338" class="body">Jackson 3</text>
  <line x1="384" y1="358" x2="608" y2="358" stroke="#f97316" stroke-width="0.6" opacity="0.3"/>
  <text x="388" y="384" class="note">정합성, 캐시, 비동기 처리,</text>
  <text x="388" y="402" class="note">스키마 관리까지 역할 분리</text>

  <!-- ===== Card 3: Observability ===== -->
  <g filter="url(#shadow)">
    <rect x="648" y="144" width="272" height="296" rx="24" fill="url(#card3g)" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <circle cx="672" cy="186" r="5" fill="#34d399" filter="url(#glow2)" opacity="0.9"/>
  <text x="688" y="192" fill="#34d399" class="card-title">Observability</text>
  <line x1="672" y1="206" x2="896" y2="206" stroke="#10b981" stroke-width="0.6" opacity="0.4"/>
  <text x="676" y="234" class="body">Actuator + Prometheus</text>
  <text x="676" y="260" class="body">Grafana Dashboard</text>
  <text x="676" y="286" class="body">OpenTelemetry Tracing</text>
  <text x="676" y="312" class="body">Sentry Error Tracking</text>
  <text x="676" y="338" class="body">Slack Webhook Alert</text>
  <line x1="672" y1="358" x2="896" y2="358" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <text x="676" y="384" class="note">상태 확인 → 오류 추적 →</text>
  <text x="676" y="402" class="note">알림까지 한 세트로 구성</text>

  <!-- ===== Card 4: Quality & Tooling ===== -->
  <g filter="url(#shadow)">
    <rect x="936" y="144" width="272" height="296" rx="24" fill="url(#card4g)" stroke="#a855f7" stroke-width="1.5"/>
  </g>
  <circle cx="960" cy="186" r="5" fill="#c084fc" filter="url(#glow2)" opacity="0.9"/>
  <text x="976" y="192" fill="#c084fc" class="card-title">Quality &amp; Tooling</text>
  <line x1="960" y1="206" x2="1184" y2="206" stroke="#a855f7" stroke-width="0.6" opacity="0.4"/>
  <text x="964" y="234" class="body">Gradle Multi-module</text>
  <text x="964" y="260" class="body">KtLint</text>
  <text x="964" y="286" class="body">Kotest + MockK</text>
  <text x="964" y="312" class="body">TestContainers</text>
  <text x="964" y="338" class="body">Docker Compose</text>
  <line x1="960" y1="358" x2="1184" y2="358" stroke="#a855f7" stroke-width="0.6" opacity="0.3"/>
  <text x="964" y="384" class="note">코드 품질, 테스트 신뢰성,</text>
  <text x="964" y="402" class="note">로컬 재현성 확보</text>

  <!-- ===== Bottom Summary Bar ===== -->
  <rect x="72" y="476" width="1136" height="116" rx="22" fill="#161b27" stroke="#1e293b" stroke-width="1.5"/>

  <rect x="96" y="498" width="340" height="72" rx="18" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <!-- glow accent -->
  <circle cx="120" cy="512" r="4" fill="#818cf8" opacity="0.7" filter="url(#glow2)"/>
  <text x="136" y="516" fill="#818cf8" font-size="13px" font-weight="700">Redis + Kafka</text>
  <text x="266" y="540" text-anchor="middle" fill="#94a3b8" font-size="13px">DB 부하 없이 순간 트래픽 흡수</text>
  <text x="266" y="558" text-anchor="middle" fill="#94a3b8" font-size="13px">빠른 응답 보장</text>

  <rect x="468" y="498" width="344" height="72" rx="18" fill="#1c1107" stroke="#f97316" stroke-width="1"/>
  <circle cx="492" cy="512" r="4" fill="#fb923c" opacity="0.7" filter="url(#glow2)"/>
  <text x="508" y="516" fill="#fb923c" font-size="13px" font-weight="700">Worker 분리</text>
  <text x="640" y="540" text-anchor="middle" fill="#94a3b8" font-size="13px">동시성 제어와 재시도를</text>
  <text x="640" y="558" text-anchor="middle" fill="#94a3b8" font-size="13px">한 곳에 집중</text>

  <rect x="844" y="498" width="340" height="72" rx="18" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <circle cx="868" cy="512" r="4" fill="#34d399" opacity="0.7" filter="url(#glow2)"/>
  <text x="884" y="516" fill="#34d399" font-size="13px" font-weight="700">Prometheus + Sentry</text>
  <text x="1014" y="540" text-anchor="middle" fill="#94a3b8" font-size="13px">장애 감지부터</text>
  <text x="1014" y="558" text-anchor="middle" fill="#94a3b8" font-size="13px">원인 분석까지 커버</text>
</svg>
