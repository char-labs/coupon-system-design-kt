<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 600" font-family="'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { fill: #f8fafc; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 16px; }
      .label { font-size: 20px; font-weight: 700; }
      .body { fill: #dbe4f0; font-size: 14px; }
      .meta { fill: #cbd5e1; font-size: 12px; }
      .chip { fill: #e2e8f0; font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1360" height="600" rx="28" fill="url(#bg)"/>

  <text x="72" y="72" class="title">기술 스택</text>
  <rect x="72" y="82" width="150" height="3" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="72" y="112" class="subtitle">프로젝트를 이루는 주요 기술을 역할 단위로 간단하게 정리했습니다.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="176" width="280" height="250" rx="24" fill="url(#c1)" stroke="#93c5fd" stroke-width="1.6"/>
    <rect x="380" y="176" width="280" height="250" rx="24" fill="url(#c2)" stroke="#fcd34d" stroke-width="1.6"/>
    <rect x="688" y="176" width="280" height="250" rx="24" fill="url(#c3)" stroke="#6ee7b7" stroke-width="1.6"/>
    <rect x="996" y="176" width="280" height="250" rx="24" fill="url(#c4)" stroke="#c4b5fd" stroke-width="1.6"/>
  </g>

  <text x="212" y="226" text-anchor="middle" fill="#dbeafe" class="label">Application</text>
  <text x="212" y="272" text-anchor="middle" class="body">Java</text>
  <text x="212" y="298" text-anchor="middle" class="body">Kotlin</text>
  <text x="212" y="324" text-anchor="middle" class="body">Spring Boot</text>
  <text x="212" y="350" text-anchor="middle" class="body">Spring Security</text>
  <text x="212" y="386" text-anchor="middle" class="meta">API와 애플리케이션 실행 환경</text>

  <text x="520" y="226" text-anchor="middle" fill="#fde68a" class="label">Data &amp; messaging</text>
  <text x="520" y="272" text-anchor="middle" class="body">MySQL</text>
  <text x="520" y="298" text-anchor="middle" class="body">Redis</text>
  <text x="520" y="324" text-anchor="middle" class="body">Kafka</text>
  <text x="520" y="350" text-anchor="middle" class="body">Flyway</text>
  <text x="520" y="386" text-anchor="middle" class="meta">저장, 상태 확인, 비동기 전달</text>

  <text x="828" y="226" text-anchor="middle" fill="#d1fae5" class="label">Observability</text>
  <text x="828" y="272" text-anchor="middle" class="body">Grafana</text>
  <text x="828" y="298" text-anchor="middle" class="body">Loki</text>
  <text x="828" y="324" text-anchor="middle" class="body">Sentry</text>
  <text x="828" y="350" text-anchor="middle" class="body">OpenTelemetry</text>
  <text x="828" y="386" text-anchor="middle" class="meta">로그, 메트릭, 오류 추적</text>

  <text x="1136" y="226" text-anchor="middle" fill="#ede9fe" class="label">Tooling</text>
  <text x="1136" y="272" text-anchor="middle" class="body">Gradle</text>
  <text x="1136" y="298" text-anchor="middle" class="body">Docker Compose</text>
  <text x="1136" y="324" text-anchor="middle" class="body">Testcontainers</text>
  <text x="1136" y="350" text-anchor="middle" class="body">ktlint</text>
  <text x="1136" y="386" text-anchor="middle" class="meta">개발, 테스트, 로컬 실행 환경</text>

  <rect x="72" y="470" width="1204" height="54" rx="18" fill="#111827" stroke="#1f2937" stroke-width="1.2"/>
  <rect x="96" y="485" width="340" height="24" rx="12" fill="#172554" stroke="#60a5fa" stroke-width="1"/>
  <rect x="504" y="485" width="340" height="24" rx="12" fill="#451a03" stroke="#fbbf24" stroke-width="1"/>
  <rect x="912" y="485" width="340" height="24" rx="12" fill="#052e16" stroke="#34d399" stroke-width="1"/>

  <text x="266" y="502" text-anchor="middle" class="chip">애플리케이션 구성</text>
  <text x="674" y="502" text-anchor="middle" class="chip">데이터와 메시지 처리</text>
  <text x="1082" y="502" text-anchor="middle" class="chip">운영 가시성과 개발 도구</text>
</svg>
