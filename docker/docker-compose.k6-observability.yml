services:
  # 부하 테스트와 로그 관측을 함께 띄우는 호환용 진입점입니다.
  influxdb:
    extends:
      file: docker-compose.load-test.yml
      service: influxdb

  grafana:
    extends:
      file: docker-compose.observability.yml
      service: grafana
    depends_on:
      - influxdb
      - loki

  loki:
    extends:
      file: docker-compose.observability.yml
      service: loki

  alloy:
    extends:
      file: docker-compose.observability.yml
      service: alloy

volumes:
  k6_influxdb_data:
  k6_grafana_data:
  loki_data:
  alloy_data:
